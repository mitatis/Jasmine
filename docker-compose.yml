services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jasmine
      POSTGRES_USER: jasmine
      POSTGRES_PASSWORD: jasmine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jasmine -d jasmine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./apps/api
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://jasmine:jasmine@postgres:5432/jasmine
      REDIS_URL: redis://redis:6379/0
      MODEL_PROVIDER_MODE: mock
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./apps/api
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://jasmine:jasmine@postgres:5432/jasmine
      REDIS_URL: redis://redis:6379/0
      CELERY_TASK_ALWAYS_EAGER: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
